<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WowoClean - Enterprise Container Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); line-height: 1.5; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .hidden { display: none !important; }
        
        .card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        
        h1, h2 { font-weight: 600; margin-bottom: 1.5rem; color: var(--text-main); }
        h1 { font-size: 1.75rem; letter-spacing: -0.025em; margin-bottom: 0; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main); }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-light); border-radius: 8px; outline: none; transition: all 0.2s; font-size: 0.95rem; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem; display: block; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); color: white; padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-warning { background-color: var(--warning); color: white; padding: 0.5rem 1rem; font-size: 0.875rem; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light); }
        .stats-badge { background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 99px; font-weight: 600; font-size: 0.875rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .data-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 12px; padding: 1.5rem; transition: transform 0.2s; }
        .data-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .data-card .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .data-card .title { font-weight: 600; font-size: 1.1rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-archived { background: #f1f5f9; color: #475569; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .data-row strong { color: var(--text-main); }
        .card-actions { margin-top: 1.5rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
        
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast { min-width: 300px; padding: 1rem 1.5rem; border-radius: 8px; color: white; font-weight: 500; font-size: 0.9rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); opacity: 0; transform: translateY(100%); animation: slideIn 0.3s forwards; }
        .toast-success { background-color: var(--success); }
        .toast-error { background-color: var(--danger); }
        
        .flex-row { display: flex; gap: 1rem; align-items: flex-end; }
        .flex-row .form-group { margin-bottom: 0; flex: 1; }
        
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(100%); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="view-login" class="container hidden" style="max-width: 450px; margin-top: 8vh;">
        <div class="card" style="padding: 2.5rem 2rem;">
            <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                <img src="wowo.png" alt="WowoClean Logo" style="max-height: 55px; width: auto; object-fit: contain;">
            </div>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Silakan masuk ke akun Anda</p>
            <form id="form-login">
                <div class="form-group">
                    <label>Email Akses</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Masuk Sistem</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Belum memiliki akses? <a href="#" id="link-to-register" style="color: var(--primary); text-decoration: none; font-weight: 500;">Registrasi Akun Baru</a>
            </p>
        </div>
    </div>

    <div id="view-register" class="container hidden" style="max-width: 450px; margin-top: 8vh;">
        <div class="card" style="padding: 2.5rem 2rem;">
            <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                <img src="wowo.png" alt="WowoClean Logo" style="max-height: 55px; width: auto; object-fit: contain;">
            </div>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Registrasi Akun Baru (Role: USER)</p>
            <form id="form-register">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="register-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Akses</label>
                    <input type="email" id="register-email" class="form-control" required>
                    <span id="err-reg-email" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="register-password" class="form-control" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Daftar Sistem</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Sudah memiliki akses? <a href="#" id="link-to-login" style="color: var(--primary); text-decoration: none; font-weight: 500;">Masuk di sini</a>
            </p>
        </div>
    </div>

    <div id="view-dashboard" class="container hidden">
        <div class="header-bar">
            <div style="display: flex; align-items: center; gap: 1.25rem;">
                <img src="wowo.png" alt="WowoClean Logo" style="max-height: 48px; width: auto; object-fit: contain;">
                <div style="display: flex; flex-direction: column; gap: 0.15rem;">
                    <h1>WowoClean Gateway</h1>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Sistem Logistik Limbah B3 - Role: <strong id="user-role-display"></strong></p>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="stats-badge" id="total-weight-display">Total Muatan: 0 kg</div>
                <button id="btn-logout" class="btn btn-danger">Keluar</button>
            </div>
        </div>

        <div id="create-panel" class="card hidden">
            <h2 style="font-size: 1.25rem; margin-bottom: 1.25rem;">Registrasi Kontainer Baru</h2>
            <form id="form-container">
                <div class="flex-row">
                    <div class="form-group">
                        <label>ID Kontainer</label>
                        <input type="text" id="input-id" class="form-control" placeholder="Contoh: WH12345">
                        <span id="err-id" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>Tipe Limbah</label>
                        <select id="input-type" class="form-control">
                            <option value="Plastic">Plastic</option>
                            <option value="Chemical">Chemical</option>
                            <option value="Metal">Metal</option>
                            <option value="Organic">Organic</option>
                        </select>
                        <span id="err-type" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>Berat (kg)</label>
                        <input type="number" id="input-weight" class="form-control">
                        <span id="err-weight" class="error-msg"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </div>
            </form>
        </div>

        <div class="card" style="padding: 1.25rem 2rem;">
            <div class="flex-row">
                <div class="form-group">
                    <label>Filter Tipe</label>
                    <select id="filter-type" class="form-control">
                        <option value="">Semua Tipe</option>
                        <option value="Plastic">Plastic</option>
                        <option value="Chemical">Chemical</option>
                        <option value="Metal">Metal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Filter Berat Minimum</label>
                    <input type="number" id="filter-weight" class="form-control" placeholder="kg">
                </div>
                <button id="btn-search" class="btn btn-primary">Cari</button>
            </div>
        </div>

        <div id="container-grid" class="grid"></div>
    </div>

    <div id="log-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative;">
            <button onclick="closeLogModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 id="log-modal-title" style="margin-bottom: 0.5rem;">Log Perjalanan</h2>
            <div id="log-content" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
